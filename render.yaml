services:
  - type: web
    name: boring-bets-staging-app
    runtime: python
    branch: matchup-history-engine
    plan: starter
    autoDeployTrigger: commit
    buildCommand: >-
      python3 -m py_compile
      scripts/render_staging.py
      scripts/live_mlb_refresh.py
    startCommand: python3 -u scripts/render_staging.py
    healthCheckPath: /healthz
    maxShutdownDelaySeconds: 30

    envVars:
      - key: BORING_BETS_DATA_ROOT
        value: /var/data/boring-bets

      - key: STAGING_USERNAME
        sync: false

      - key: STAGING_PASSWORD
        sync: false

      - key: PYTHONUNBUFFERED
        value: "1"

      - key: TZ
        value: America/New_York

    disk:
      name: boring-bets-staging-data
      mountPath: /var/data
      sizeGB: 1
