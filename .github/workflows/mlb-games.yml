name: Refresh MLB game intelligence

on:
  workflow_dispatch:
    inputs:
      days_ahead:
        description: Future dates to refresh
        required: false
        default: "7"
  schedule:
    # Lightweight schedule/status/score/card refresh every 15 minutes.
    - cron: "0,30,45 * * * *"

    # Full enrichment of today's slate every hour.
    - cron: "15 * * * *"

    # Refresh today plus the next seven days every morning.
    - cron: "42 9 * * *"

permissions:
  contents: write

concurrency:
  group: mlb-game-intelligence-refresh
  cancel-in-progress: false

jobs:
  refresh-card-status:
    if: github.event_name == 'schedule' && github.event.schedule == '0,30,45 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Download website files
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Resolve Eastern card date
        id: card-date
        run: |
          CARD_DATE=$(TZ=America/New_York date +%F)
          SEASON=${CARD_DATE%%-*}
          echo "date=$CARD_DATE" >> "$GITHUB_OUTPUT"
          echo "season=$SEASON" >> "$GITHUB_OUTPUT"

      - name: Refresh official MLB status, start times, probable pitchers, and scores
        run: |
          python3 -u scripts/sync_baseball_final_scores.py \
            --season "${{ steps.card-date.outputs.season }}" \
            --date "${{ steps.card-date.outputs.date }}"

      - name: Refresh affiliated Minor League daily cards
        continue-on-error: true
        run: |
          python3 -u scripts/build_minor_league_schedules.py \
            --season "${{ steps.card-date.outputs.season }}" \
            --date "${{ steps.card-date.outputs.date }}" \
            --daily-only

      - name: Rebuild lightweight MLB card feed
        run: |
          python3 -u scripts/build_todays_card_data.py \
            --date "${{ steps.card-date.outputs.date }}"

      - name: Save updated card data
        run: |
          git config user.name "boring-bets-intelligence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/games data/live-games data/cards data/schedules/baseball
          git diff --cached --quiet || git commit -m "Auto-refresh today's baseball cards"
          git push

  refresh-today:
    if: github.event_name == 'schedule' && github.event.schedule == '15 * * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Download website files
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore matchup-history cache
        uses: actions/cache@v4
        with:
          path: data/cache/matchup-history
          key: matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-${{ github.run_id }}
          restore-keys: |
            matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-
            matchup-history-${{ runner.os }}-

      - name: Refresh today's MLB slate and card feeds
        run: |
          python3 -u scripts/scheduled_refresh.py \
            --days-ahead 0 \
            --skip-globe \
            --skip-verification

      - name: Save updated MLB intelligence
        run: |
          git config user.name "boring-bets-intelligence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/games data/live-games data/cards data/schedules/baseball
          git add data/games-meta.json data/games-index.json data/days.json data/plays.json data/results.json data/evaluations.json
          git diff --cached --quiet || git commit -m "Auto-refresh today's MLB intelligence"
          git push

  refresh-future:
    if: github.event_name == 'schedule' && github.event.schedule == '42 9 * * *'
    runs-on: ubuntu-latest
    timeout-minutes: 210
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Download website files
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore matchup-history cache
        uses: actions/cache@v4
        with:
          path: data/cache/matchup-history
          key: matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-${{ github.run_id }}
          restore-keys: |
            matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-
            matchup-history-${{ runner.os }}-

      - name: Refresh rolling MLB window and card feeds
        run: |
          python3 -u scripts/scheduled_refresh.py \
            --days-ahead 7 \
            --sync-season \
            --season 2026 \
            --skip-globe \
            --skip-verification \
            --continue-on-error

      - name: Save updated MLB intelligence
        run: |
          git config user.name "boring-bets-intelligence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/games data/live-games data/cards data/schedules/baseball
          git add data/games-meta.json data/games-index.json data/days.json data/plays.json data/results.json data/evaluations.json
          git diff --cached --quiet || git commit -m "Auto-refresh future MLB intelligence"
          git push

  manual-refresh:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 210
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}

    steps:
      - name: Download website files
        uses: actions/checkout@v5

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore matchup-history cache
        uses: actions/cache@v4
        with:
          path: data/cache/matchup-history
          key: matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-${{ github.run_id }}
          restore-keys: |
            matchup-history-${{ runner.os }}-${{ hashFiles('scripts/mlb/matchup_history.py') }}-
            matchup-history-${{ runner.os }}-

      - name: Refresh requested MLB window and card feeds
        run: |
          python3 -u scripts/scheduled_refresh.py \
            --days-ahead "${{ inputs.days_ahead }}" \
            --skip-globe \
            --skip-verification \
            --continue-on-error

      - name: Save updated MLB intelligence
        run: |
          git config user.name "boring-bets-intelligence-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A data/games data/live-games data/cards data/schedules/baseball
          git add data/games-meta.json data/games-index.json data/days.json data/plays.json data/results.json data/evaluations.json
          git diff --cached --quiet || git commit -m "Manually refresh MLB intelligence"
          git push
