name: Refresh MLB deadline data

on:
  workflow_dispatch:
  schedule:
    - cron: "7,37 * * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Download website files
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update data
        run: python scripts/update_data.py

      - name: Save updated data
        run: |
          git config user.name "deadline-war-room-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/site-data.json
          git diff --cached --quiet || git commit -m "Auto-refresh MLB deadline data"
          git push
